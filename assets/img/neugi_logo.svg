<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="neugiTextGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f5d4"/>
      <stop offset="50%" style="stop-color:#7b2cbf"/>
      <stop offset="100%" style="stop-color:#f15bb5"/>
    </linearGradient>
  </defs>
  <!-- Neural Brain Icon -->
  <g transform="translate(30, 25)">
    <circle cx="75" cy="75" r="55" fill="none" stroke="url(#neugiTextGrad)" stroke-width="6"/>
    <circle cx="75" cy="75" r="35" fill="url(#neugiTextGrad)" opacity="0.3"/>
    <circle cx="75" cy="75" r="15" fill="url(#neugiTextGrad)"/>
    <!-- Neural connections -->
    <line x1="75" y1="20" x2="75" y2="40" stroke="url(#neugiTextGrad)" stroke-width="4"/>
    <line x1="75" y1="110" x2="75" y2="130" stroke="url(#neugiTextGrad)" stroke-width="4"/>
    <line x1="20" y1="75" x2="40" y2="75" stroke="url(#neugiTextGrad)" stroke-width="4"/>
    <line x1="110" y1="75" x2="130" y2="75" stroke="url(#neugiTextGrad)" stroke-width="4"/>
    <!-- Node points -->
    <circle cx="75" cy="20" r="8" fill="#00f5d4"/>
    <circle cx="75" cy="130" r="8" fill="#f15bb5"/>
    <circle cx="20" cy="75" r="8" fill="#00f5d4"/>
    <circle cx="130" cy="75" r="8" fill="#f15bb5"/>
  </g>
  <!-- NEUGI Text -->
  <text x="180" y="130" font-family="'JetBrains Mono', monospace" font-size="100" font-weight="bold" fill="url(#neugiTextGrad)">NEUGI</text>
  <text x="185" y="160" font-family="'Inter', sans-serif" font-size="24" fill="#a1a1aa">The Ultimate Agent Platform</text>
</svg>