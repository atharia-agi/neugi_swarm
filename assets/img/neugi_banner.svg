<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="neuralGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f5d4"/>
      <stop offset="50%" style="stop-color:#7b2cbf"/>
      <stop offset="100%" style="stop-color:#f15bb5"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00f5d4;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#00f5d4;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)"/>
  
  <!-- Grid pattern -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="0" x2="1200" y2="400"/>
    <line x1="0" y1="100" x2="1200" y2="500"/>
    <line x1="0" y1="200" x2="1200" y2="600"/>
    <line x1="0" y1="300" x2="1200" y2="700"/>
    <line x1="0" y1="400" x2="1200" y2="800"/>
    <line x1="0" y1="400" x2="1200" y2="0"/>
    <line x1="100" y1="0" x2="1300" y2="400"/>
    <line x1="200" y1="0" x2="1400" y2="400"/>
    <line x1="300" y1="0" x2="1500" y2="400"/>
    <line x1="400" y1="0" x2="1600" y2="400"/>
    <line x1="500" y1="0" x2="1700" y2="400"/>
    <line x1="600" y1="0" x2="1800" y2="400"/>
    <line x1="700" y1="0" x2="1900" y2="400"/>
    <line x1="800" y1="0" x2="2000" y2="400"/>
    <line x1="900" y1="0" x2="2100" y2="400"/>
    <line x1="1000" y1="0" x2="2200" y2="400"/>
    <line x1="1100" y1="0" x2="2300" y2="400"/>
  </g>
  
  <!-- Central Neural Core -->
  <circle cx="600" cy="200" r="120" fill="url(#glow)"/>
  <circle cx="600" cy="200" r="80" fill="none" stroke="url(#neuralGrad)" stroke-width="4"/>
  <circle cx="600" cy="200" r="50" fill="none" stroke="url(#neuralGrad)" stroke-width="2" opacity="0.7"/>
  <circle cx="600" cy="200" r="25" fill="url(#neuralGrad)"/>
  
  <!-- Neural Network Lines -->
  <g stroke="url(#neuralGrad)" stroke-width="2" opacity="0.6">
    <!-- Radial lines -->
    <line x1="600" y1="80" x2="600" y2="200"/>
    <line x1="600" y1="320" x2="600" y2="200"/>
    <line x1="520" y1="200" x2="600" y2="200"/>
    <line x1="680" y1="200" x2="600" y2="200"/>
    <!-- Diagonal lines -->
    <line x1="537" y1="137" x2="568" y2="168"/>
    <line x1="663" y1="263" x2="632" y2="232"/>
    <line x1="537" y1="263" x2="568" y2="232"/>
    <line x1="663" y1="137" x2="632" y2="168"/>
  </g>
  
  <!-- Network Nodes -->
  <g fill="url(#neuralGrad)">
    <circle cx="600" cy="60" r="12"/>
    <circle cx="600" cy="340" r="12"/>
    <circle cx="480" cy="200" r="12"/>
    <circle cx="720" cy="200" r="12"/>
    <circle cx="497" cy="97" r="8"/>
    <circle cx="703" cy="303" r="8"/>
    <circle cx="497" cy="303" r="8"/>
    <circle cx="703" cy="97" r="8"/>
  </g>
  
  <!-- Floating particles -->
  <circle cx="200" cy="100" r="3" fill="#00f5d4" opacity="0.5"/>
  <circle cx="1000" cy="300" r="4" fill="#f15bb5" opacity="0.5"/>
  <circle cx="300" cy="350" r="2" fill="#7b2cbf" opacity="0.5"/>
  <circle cx="900" cy="80" r="3" fill="#00f5d4" opacity="0.5"/>
  <circle cx="150" cy="250" r="2" fill="#f15bb5" opacity="0.3"/>
  <circle cx="1050" cy="180" r="3" fill="#7b2cbf" opacity="0.3"/>
  
  <!-- Text -->
  <text x="600" y="50" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="24" fill="#00f5d4" opacity="0.8">NEURAL GENERAL INTELLIGENCE</text>
  <text x="600" y="380" text-anchor="middle" font-family="'Inter', sans-serif" font-size="18" fill="#a1a1aa" opacity="0.6">v29.0 • The Ultimate Agent Platform</text>
</svg>