  <g stroke="url(#neugiGrad)" stroke-width="12" fill="none" opacity="0.8">
    <circle cx="256" cy="256" r="140" stroke-dasharray="20 10"/>
    <circle cx="256" cy="256" r="200" stroke-dasharray="30 15"/>
    <!-- Connections -->
    <line x1="256" y1="96" x2="256" y2="176"/>
    <line x1="256" y1="336" x2="256" y2="416"/>
    <line x1="96" y1="256" x2="176" y2="256"/>
    <line x1="336" y1="256" x2="416" y2="256"/>
    <!-- Diagonals -->
    <line x1="146" y1="146" x2="206" y2="206"/>
    <line x1="306" y1="306" x2="366" y2="366"/>
    <line x1="366" y1="146" x2="306" y2="206"/>
    <line x1="206" y1="306" x2="146" y2="366"/>
  </g>
  <!-- Neural Nodes -->
  <circle cx="256" cy="96" r="24" fill="#00f5d4"/>
  <circle cx="256" cy="416" r="24" fill="#f15bb5"/>
  <circle cx="96" cy="256" r="24" fill="#00f5d4"/>
  <circle cx="416" cy="256" r="24" fill="#f15bb5"/>
  <circle cx="146" cy="146" r="16" fill="#7b2cbf"/>
  <circle cx="366" cy="146" r="16" fill="#7b2cbf"/>
  <circle cx="146" cy="366" r="16" fill="#7b2cbf"/>
  <circle cx="366" cy="366" r="16" fill="#7b2cbf"/>
</svg>