<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnostics — Neugi Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #000000;
            --bg-sidebar: #050505;
            --bg-elevated: #0a0a0a;
            --bg-layer: rgba(255, 255, 255, 0.04);
            --bg-layer-hover: rgba(255, 255, 255, 0.07);
            
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --text-tertiary: #71717a;
            
            --border-subtle: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
            
            --status-green: #10b981;
            --status-red: #ef4444;
            --status-yellow: #f59e0b;
            
            --font-sans: 'Inter', -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            font-family: var(--font-sans); background-color: var(--bg-base);
            color: var(--text-primary); height: 100vh; display: flex; overflow: hidden;
            zoom: 0.8;
        }

        .ambient { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: -1; background: radial-gradient(circle at 80% 0%, rgba(30, 0, 0, 0.5), transparent 40%); }

        .sidebar { width: 260px; background: var(--bg-sidebar); border-right: 1px solid var(--border-subtle); display: flex; flex-direction: column; z-index: 10; }
        .sidebar-header { height: 64px; padding: 0 20px; display: flex; align-items: center; border-bottom: 1px solid var(--border-subtle); }
        .brand-logo { font-size: 15px; font-weight: 600; color: var(--text-primary); text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .nav-links { padding: 20px 12px; display: flex; flex-direction: column; gap: 4px; flex: 1; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 6px; color: var(--text-secondary); text-decoration: none; font-size: 13px; font-weight: 500; transition: all 0.2s; }
        .nav-item:hover { background: var(--bg-layer); color: var(--text-primary); }
        .nav-item.active { background: var(--bg-layer-hover); color: var(--text-primary); }
        .nav-item svg { width: 16px; height: 16px; stroke: currentColor; opacity: 0.8; }

        .workspace { flex: 1; display: flex; flex-direction: column; position: relative; }
        .top-header { height: 64px; padding: 0 32px; border-bottom: 1px solid var(--border-subtle); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.5); backdrop-filter: blur(12px); z-index: 10; }
        .breadcrumbs { font-size: 14px; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; }
        .breadcrumbs span.current { color: var(--text-primary); font-weight: 500; }

        .content { flex: 1; overflow-y: auto; padding: 32px; display: flex; flex-direction: column; gap: 24px; max-width: 960px; margin: 0 auto; width: 100%; }
        
        .panel { background: var(--bg-elevated); border: 1px solid var(--border-subtle); border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
        .panel-header { padding: 16px 20px; border-bottom: 1px solid var(--border-subtle); display: flex; justify-content: space-between; align-items: center; background: #050505; }
        .panel-title { font-size: 13px; font-weight: 600; color: var(--text-primary); }
        
        .btn { padding: 8px 16px; border-radius: 4px; border: 1px solid var(--border-subtle); background: var(--bg-layer); color: var(--text-primary); font-size: 13px; cursor: pointer; transition: all 0.2s; font-family: var(--font-sans); }
        .btn:hover { background: var(--bg-layer-hover); border-color: var(--border-hover); }
        .btn-danger { background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.2); color: var(--status-red); }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.2); }

        .terminal-log { background: #050505; font-family: var(--font-mono); font-size: 13px; color: var(--text-secondary); padding: 20px; height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .log-line { display: flex; gap: 12px; }
        .log-time { color: var(--text-tertiary); }
        .log-msg.error { color: var(--status-red); }
        .log-msg.success { color: var(--status-green); }
        .log-msg.warn { color: var(--status-yellow); }

        .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
        .metric-box { padding: 16px; border: 1px solid var(--border-subtle); border-radius: 6px; background: rgba(255,255,255,0.01); display: flex; justify-content: space-between; align-items: center; }
        .metric-label { font-size: 12px; color: var(--text-secondary); }
        .metric-value { font-family: var(--font-mono); font-size: 16px; color: var(--text-primary); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }
    </style>
</head>
<body>
    <div class="ambient"></div>

    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="index.html" class="brand-logo">
                <img src="assets/img/neugi_icon.webp" alt="Neugi" style="width:22px; height:22px; border-radius:4px;">
                Neugi
            </a>
        </div>
        <nav class="nav-links">
            <a href="dashboard.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
                Console
            </a>
            <a href="technician.html" class="nav-item active">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
                Diagnostics
            </a>
            <a href="docs.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                Documentation
            </a>
            <a href="index.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                Exit Console
            </a>
        </nav>
    </aside>

    <main class="workspace">
        <header class="top-header">
            <div class="breadcrumbs">
                <span>Projects</span>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
                <span>Neugi Swarm</span>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
                <span class="current">Diagnostic Technician</span>
            </div>
            <div style="font-family: var(--font-mono); font-size: 12px; color: var(--status-red);">
                SYSTEM OVERRIDE DETECTED
            </div>
        </header>

        <div class="content">
            <div class="metrics-grid">
                <div class="metric-box">
                    <span class="metric-label">Memory Graph Load</span>
                    <span class="metric-value" id="memMetric">4.2 MB</span>
                </div>
                <div class="metric-box">
                    <span class="metric-label">LLM Context Utilization</span>
                    <span class="metric-value" id="llmMetric">12.5%</span>
                </div>
                <div class="metric-box">
                    <span class="metric-label">Neural Pathways</span>
                    <span class="metric-value" style="color:var(--status-green);">HEALTHY</span>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <h2 class="panel-title">System Repair Routine (Technician)</h2>
                    <div style="display:flex; gap: 8px;">
                        <button class="btn" onclick="runDiagnostic()">Run Full Scan</button>
                        <button class="btn btn-danger" onclick="clearMemory()">Purge Memory</button>
                    </div>
                </div>
                <div class="terminal-log" id="logBox">
                    <div class="log-line">
                        <span class="log-time">[00:00:00]</span>
                        <span class="log-msg">Neugi Diagnostic Technician initialized.</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function logMsg(msg, type = '') {
            const time = new Date().toLocaleTimeString('en-US', {hour12:false});
            const box = document.getElementById('logBox');
            box.innerHTML += `
                <div class="log-line">
                    <span class="log-time">[${time}]</span>
                    <span class="log-msg ${type}">${msg}</span>
                </div>
            `;
            box.scrollTop = box.scrollHeight;
        }

        async function runDiagnostic() {
            const steps = [
                { msg: 'Initiating recursive infrastructure scan...', type: 'warn' },
                { msg: 'Checking Ollama binding... OK', type: 'success' },
                { msg: 'Validating 9-node neural topology... OK', type: 'success' },
                { msg: 'Scanning code_execution tools for anomalies...', type: '' },
                { msg: 'Neural synchronization stabilized at 12ms latency.', type: 'success' },
                { msg: 'Purging transient buffer objects... OK', type: '' },
                { msg: 'No anomalies detected. Swarm integrity is flawless.', type: 'success' }
            ];

            let delay = 0;
            steps.forEach(step => {
                setTimeout(() => logMsg(step.msg, step.type), delay);
                delay += 400 + Math.random() * 800;
            });
        }

        async function clearMemory() {
            logMsg('WARNING: Purging Vector Graph DB...', 'error');
            setTimeout(() => {
                logMsg('Graph cleared successfully. Neural baseline reset.', 'warn');
                document.getElementById('memMetric').textContent = '0.1 MB';
            }, 800);
        }

        // Live Telemetry Loop
        setInterval(() => {
            const mem = (4.0 + Math.random() * 0.5).toFixed(1);
            const llm = (12.0 + Math.random() * 1.5).toFixed(1);
            document.getElementById('memMetric').textContent = `${mem} MB`;
            document.getElementById('llmMetric').textContent = `${llm}%`;
        }, 2000);
    </script>
</body>
</html>
